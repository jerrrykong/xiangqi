<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 600">
  <defs>
    <!-- 木纹纹理 -->
    <pattern id="woodGrain" x="0" y="0" width="120" height="60" patternUnits="userSpaceOnUse">
      <rect width="120" height="60" fill="#DEB887"/>
      <line x1="0" y1="8" x2="120" y2="7" stroke="#D4A76A" stroke-width="0.8" opacity="0.5"/>
      <line x1="0" y1="20" x2="120" y2="21" stroke="#CEA06A" stroke-width="0.6" opacity="0.4"/>
      <line x1="0" y1="35" x2="120" y2="34" stroke="#D4A76A" stroke-width="0.7" opacity="0.45"/>
      <line x1="0" y1="48" x2="120" y2="49" stroke="#C89862" stroke-width="0.5" opacity="0.35"/>
      <line x1="15" y1="0" x2="14" y2="60" stroke="#DAB880" stroke-width="0.4" opacity="0.2"/>
      <line x1="52" y1="0" x2="53" y2="60" stroke="#DAB880" stroke-width="0.4" opacity="0.2"/>
      <line x1="88" y1="0" x2="87" y2="60" stroke="#DAB880" stroke-width="0.4" opacity="0.2"/>
      <line x1="110" y1="0" x2="111" y2="60" stroke="#DAB880" stroke-width="0.4" opacity="0.2"/>
    </pattern>

    <!-- 木板边框纹理 -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C3A1E"/>
      <stop offset="15%" stop-color="#6B4423"/>
      <stop offset="50%" stop-color="#7B5530"/>
      <stop offset="85%" stop-color="#6B4423"/>
      <stop offset="100%" stop-color="#5C3A1E"/>
    </linearGradient>

    <linearGradient id="borderGradV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C3A1E"/>
      <stop offset="15%" stop-color="#6B4423"/>
      <stop offset="50%" stop-color="#7B5530"/>
      <stop offset="85%" stop-color="#6B4423"/>
      <stop offset="100%" stop-color="#5C3A1E"/>
    </linearGradient>

    <!-- 阴影 -->
    <filter id="boardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#5C3A1E" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5C3A1E" flood-opacity="0.2"/>
    </filter>

    <!-- 河界底色渐变 -->
    <linearGradient id="riverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C89862" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#CDA87A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C89862" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- 棋盘底色 -->
  <rect x="0" y="0" width="540" height="600" rx="2" fill="url(#woodGrain)"/>

  <!-- 外框阴影 -->
  <rect x="4" y="4" width="532" height="592" rx="3" fill="none" filter="url(#boardShadow)" stroke="none"/>

  <!-- ═══════════════════════════════════════════
       格线
       ═══════════════════════════════════════════ -->

  <!-- 纵向线（从上到下贯穿）: col 0 和 col 8 -->
  <line x1="30" y1="30" x2="30" y2="570" stroke="#5C3A1E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="510" y1="30" x2="510" y2="570" stroke="#5C3A1E" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 纵向线（河界断开）: col 1..7 -->
  <!-- 上半部分 -->
  <line x1="90" y1="30" x2="90" y2="268" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="150" y1="30" x2="150" y2="268" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="210" y1="30" x2="210" y2="268" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="270" y1="30" x2="270" y2="268" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="330" y1="30" x2="330" y2="268" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="390" y1="30" x2="390" y2="268" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="450" y1="30" x2="450" y2="268" stroke="#5C3A1E" stroke-width="1.5"/>

  <!-- 纵向线（河界断开）: col 1..7 下半部分 -->
  <line x1="90" y1="332" x2="90" y2="570" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="150" y1="332" x2="150" y2="570" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="210" y1="332" x2="210" y2="570" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="270" y1="332" x2="270" y2="570" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="330" y1="332" x2="330" y2="570" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="390" y1="332" x2="390" y2="570" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="450" y1="332" x2="450" y2="570" stroke="#5C3A1E" stroke-width="1.5"/>

  <!-- 横向线: row 0..9 -->
  <line x1="28" y1="30" x2="512" y2="30" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="28" y1="90" x2="512" y2="90" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="28" y1="150" x2="512" y2="150" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="28" y1="210" x2="512" y2="210" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="28" y1="270" x2="512" y2="270" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="28" y1="330" x2="512" y2="330" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="28" y1="390" x2="512" y2="390" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="28" y1="450" x2="512" y2="450" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="28" y1="510" x2="512" y2="510" stroke="#5C3A1E" stroke-width="1.5"/>
  <line x1="28" y1="570" x2="512" y2="570" stroke="#5C3A1E" stroke-width="1.5"/>

  <!-- 斜线（九宫）：上方 → cols 3-5, rows 0-2 -->
  <line x1="210" y1="30" x2="330" y2="150" stroke="#5C3A1E" stroke-width="1.2"/>
  <line x1="330" y1="30" x2="210" y2="150" stroke="#5C3A1E" stroke-width="1.2"/>

  <!-- 斜线（九宫）：下方 → cols 3-5, rows 7-9 -->
  <line x1="210" y1="450" x2="330" y2="570" stroke="#5C3A1E" stroke-width="1.2"/>
  <line x1="330" y1="450" x2="210" y2="570" stroke="#5C3A1E" stroke-width="1.2"/>

  <!-- ═══════════════════════════════════════════
       河界区域
       ═══════════════════════════════════════════ -->
  <rect x="28" y="272" width="484" height="56" fill="url(#riverGrad)"/>

  <!-- 河界文字 -->
  <text x="160" y="304" font-family="'KaiTi','STKaiti','楷体','Noto Serif TC',serif" font-size="28" font-weight="bold" fill="#5C3A1E" opacity="0.8" text-anchor="middle" letter-spacing="8">
    楚 河
  </text>
  <text x="380" y="304" font-family="'KaiTi','STKaiti','楷体','Noto Serif TC',serif" font-size="28" font-weight="bold" fill="#5C3A1E" opacity="0.8" text-anchor="middle" letter-spacing="8">
    汉 界
  </text>

  <!-- ═══════════════════════════════════════════
       星位标记（四方角形）
       每个标记由 L 形角标组成，间距 g=5, 线长 l=10
       边缘位置只显示内侧角标
       ═══════════════════════════════════════════ -->

  <!-- 炮位星 (1,2), (7,2), (1,7), (7,7) -->
  <!-- (1,2) = x=90, y=150 — 四角 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.7">
    <!-- 左上 -->
    <line x1="85" y1="145" x2="75" y2="145"/><line x1="85" y1="145" x2="85" y2="135"/>
    <!-- 右上 -->
    <line x1="95" y1="145" x2="105" y2="145"/><line x1="95" y1="145" x2="95" y2="135"/>
    <!-- 左下 -->
    <line x1="85" y1="155" x2="75" y2="155"/><line x1="85" y1="155" x2="85" y2="165"/>
    <!-- 右下 -->
    <line x1="95" y1="155" x2="105" y2="155"/><line x1="95" y1="155" x2="95" y2="165"/>
  </g>
  <!-- (7,2) = x=450, y=150 — 四角 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.7">
    <!-- 左上 -->
    <line x1="445" y1="145" x2="435" y2="145"/><line x1="445" y1="145" x2="445" y2="135"/>
    <!-- 右上 -->
    <line x1="455" y1="145" x2="465" y2="145"/><line x1="455" y1="145" x2="455" y2="135"/>
    <!-- 左下 -->
    <line x1="445" y1="155" x2="435" y2="155"/><line x1="445" y1="155" x2="445" y2="165"/>
    <!-- 右下 -->
    <line x1="455" y1="155" x2="465" y2="155"/><line x1="455" y1="155" x2="455" y2="165"/>
  </g>
  <!-- (1,7) = x=90, y=450 — 四角 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.7">
    <!-- 左上 -->
    <line x1="85" y1="445" x2="75" y2="445"/><line x1="85" y1="445" x2="85" y2="435"/>
    <!-- 右上 -->
    <line x1="95" y1="445" x2="105" y2="445"/><line x1="95" y1="445" x2="95" y2="435"/>
    <!-- 左下 -->
    <line x1="85" y1="455" x2="75" y2="455"/><line x1="85" y1="455" x2="85" y2="465"/>
    <!-- 右下 -->
    <line x1="95" y1="455" x2="105" y2="455"/><line x1="95" y1="455" x2="95" y2="465"/>
  </g>
  <!-- (7,7) = x=450, y=450 — 四角 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.7">
    <!-- 左上 -->
    <line x1="445" y1="445" x2="435" y2="445"/><line x1="445" y1="445" x2="445" y2="435"/>
    <!-- 右上 -->
    <line x1="455" y1="445" x2="465" y2="445"/><line x1="455" y1="445" x2="455" y2="435"/>
    <!-- 左下 -->
    <line x1="445" y1="455" x2="435" y2="455"/><line x1="445" y1="455" x2="445" y2="465"/>
    <!-- 右下 -->
    <line x1="455" y1="455" x2="465" y2="455"/><line x1="455" y1="455" x2="455" y2="465"/>
  </g>

  <!-- 兵/卒位星 -->
  <!-- (0,3)=x=30,y=210 — 左边缘，仅右侧 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.6">
    <line x1="35" y1="205" x2="45" y2="205"/><line x1="35" y1="205" x2="35" y2="195"/>
    <line x1="35" y1="215" x2="45" y2="215"/><line x1="35" y1="215" x2="35" y2="225"/>
  </g>
  <!-- (2,3)=x=150,y=210 — 四角 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.6">
    <line x1="145" y1="205" x2="135" y2="205"/><line x1="145" y1="205" x2="145" y2="195"/>
    <line x1="155" y1="205" x2="165" y2="205"/><line x1="155" y1="205" x2="155" y2="195"/>
    <line x1="145" y1="215" x2="135" y2="215"/><line x1="145" y1="215" x2="145" y2="225"/>
    <line x1="155" y1="215" x2="165" y2="215"/><line x1="155" y1="215" x2="155" y2="225"/>
  </g>
  <!-- (4,3)=x=270,y=210 — 四角 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.6">
    <line x1="265" y1="205" x2="255" y2="205"/><line x1="265" y1="205" x2="265" y2="195"/>
    <line x1="275" y1="205" x2="285" y2="205"/><line x1="275" y1="205" x2="275" y2="195"/>
    <line x1="265" y1="215" x2="255" y2="215"/><line x1="265" y1="215" x2="265" y2="225"/>
    <line x1="275" y1="215" x2="285" y2="215"/><line x1="275" y1="215" x2="275" y2="225"/>
  </g>
  <!-- (6,3)=x=390,y=210 — 四角 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.6">
    <line x1="385" y1="205" x2="375" y2="205"/><line x1="385" y1="205" x2="385" y2="195"/>
    <line x1="395" y1="205" x2="405" y2="205"/><line x1="395" y1="205" x2="395" y2="195"/>
    <line x1="385" y1="215" x2="375" y2="215"/><line x1="385" y1="215" x2="385" y2="225"/>
    <line x1="395" y1="215" x2="405" y2="215"/><line x1="395" y1="215" x2="395" y2="225"/>
  </g>
  <!-- (8,3)=x=510,y=210 — 右边缘，仅左侧 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.6">
    <line x1="505" y1="205" x2="495" y2="205"/><line x1="505" y1="205" x2="505" y2="195"/>
    <line x1="505" y1="215" x2="495" y2="215"/><line x1="505" y1="215" x2="505" y2="225"/>
  </g>
  <!-- (0,6)=x=30,y=390 — 左边缘，仅右侧 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.6">
    <line x1="35" y1="385" x2="45" y2="385"/><line x1="35" y1="385" x2="35" y2="375"/>
    <line x1="35" y1="395" x2="45" y2="395"/><line x1="35" y1="395" x2="35" y2="405"/>
  </g>
  <!-- (2,6)=x=150,y=390 — 四角 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.6">
    <line x1="145" y1="385" x2="135" y2="385"/><line x1="145" y1="385" x2="145" y2="375"/>
    <line x1="155" y1="385" x2="165" y2="385"/><line x1="155" y1="385" x2="155" y2="375"/>
    <line x1="145" y1="395" x2="135" y2="395"/><line x1="145" y1="395" x2="145" y2="405"/>
    <line x1="155" y1="395" x2="165" y2="395"/><line x1="155" y1="395" x2="155" y2="405"/>
  </g>
  <!-- (4,6)=x=270,y=390 — 四角 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.6">
    <line x1="265" y1="385" x2="255" y2="385"/><line x1="265" y1="385" x2="265" y2="375"/>
    <line x1="275" y1="385" x2="285" y2="385"/><line x1="275" y1="385" x2="275" y2="375"/>
    <line x1="265" y1="395" x2="255" y2="395"/><line x1="265" y1="395" x2="265" y2="405"/>
    <line x1="275" y1="395" x2="285" y2="395"/><line x1="275" y1="395" x2="275" y2="405"/>
  </g>
  <!-- (6,6)=x=390,y=390 — 四角 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.6">
    <line x1="385" y1="385" x2="375" y2="385"/><line x1="385" y1="385" x2="385" y2="375"/>
    <line x1="395" y1="385" x2="405" y2="385"/><line x1="395" y1="385" x2="395" y2="375"/>
    <line x1="385" y1="395" x2="375" y2="395"/><line x1="385" y1="395" x2="385" y2="405"/>
    <line x1="395" y1="395" x2="405" y2="395"/><line x1="395" y1="395" x2="395" y2="405"/>
  </g>
  <!-- (8,6)=x=510,y=390 — 右边缘，仅左侧 -->
  <g stroke="#5C3A1E" stroke-width="1.2" opacity="0.6">
    <line x1="505" y1="385" x2="495" y2="385"/><line x1="505" y1="385" x2="505" y2="375"/>
    <line x1="505" y1="395" x2="495" y2="395"/><line x1="505" y1="395" x2="505" y2="405"/>
  </g>

  <!-- ═══════════════════════════════════════════
       边框装饰
       ═══════════════════════════════════════════ -->
  <!-- 内边框金线 -->
  <rect x="6" y="6" width="528" height="588" rx="2" fill="none" stroke="#8B6914" stroke-width="2"/>
  <!-- 外边框木框 -->
  <rect x="2" y="2" width="536" height="596" rx="3" fill="none" stroke="url(#borderGradV)" stroke-width="4"/>

  <!-- 四角装饰 -->
  <g fill="#8B6914" opacity="0.5">
    <!-- 左上 -->
    <rect x="8" y="8" width="16" height="2" rx="1"/>
    <rect x="8" y="8" width="2" height="16" rx="1"/>
    <!-- 右上 -->
    <rect x="516" y="8" width="16" height="2" rx="1"/>
    <rect x="530" y="8" width="2" height="16" rx="1"/>
    <!-- 左下 -->
    <rect x="8" y="590" width="16" height="2" rx="1"/>
    <rect x="8" y="578" width="2" height="16" rx="1"/>
    <!-- 右下 -->
    <rect x="516" y="590" width="16" height="2" rx="1"/>
    <rect x="530" y="578" width="2" height="16" rx="1"/>
  </g>
</svg>
