<!-- 玩家头像：20岁活力男孩，运动风，短发，阳光帅气 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <!-- 背景圆 -->
  <circle cx="28" cy="28" r="27" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <!-- 衣服 - 运动款 -->
  <path d="M12 54 Q13 43 28 43 Q43 43 44 54Z" fill="#059669"/>
  <!-- 运动条纹 -->
  <path d="M18 43 L16 54" stroke="#34D399" stroke-width="2" opacity="0.6"/>
  <path d="M38 43 L40 54" stroke="#34D399" stroke-width="2" opacity="0.6"/>
  <!-- 领口 -->
  <path d="M23 43 L28 48 L33 43" fill="#047857"/>
  <!-- 脖子 -->
  <rect x="24.5" y="36.5" width="7" height="7" rx="3" fill="#FCD34D"/>
  <!-- 头部 -->
  <circle cx="28" cy="24" r="13" fill="#FCD34D"/>
  <!-- 头发 - 短发，有型，刺猬感 -->
  <path d="M15 20 Q15 10 28 10 Q41 10 41 20" fill="#1C1917"/>
  <!-- 头发小尖 -->
  <path d="M20 13 L18 9 L22 12.5" fill="#1C1917"/>
  <path d="M25 11.5 L24 7.5 L27 11" fill="#1C1917"/>
  <path d="M30 11 L31 7.5 L32 11.5" fill="#1C1917"/>
  <path d="M35 12.5 L36 9 L38 13" fill="#1C1917"/>
  <!-- 鬓角 -->
  <rect x="15" y="20" width="2.5" height="6" rx="1" fill="#1C1917"/>
  <rect x="38.5" y="20" width="2.5" height="6" rx="1" fill="#1C1917"/>
  <!-- 耳朵 -->
  <ellipse cx="15" cy="25" rx="2.5" ry="3.2" fill="#F59E0B"/>
  <ellipse cx="41" cy="25" rx="2.5" ry="3.2" fill="#F59E0B"/>
  <!-- 眼睛 - 眼角稍扬，阳光 -->
  <ellipse cx="22.5" cy="23.8" rx="3" ry="2.2" fill="white"/>
  <ellipse cx="33.5" cy="23.8" rx="3" ry="2.2" fill="white"/>
  <circle cx="23" cy="24" r="1.6" fill="#1C1917"/>
  <circle cx="34" cy="24" r="1.6" fill="#1C1917"/>
  <circle cx="23.6" cy="23.4" r="0.65" fill="white"/>
  <circle cx="34.6" cy="23.4" r="0.65" fill="white"/>
  <!-- 眉毛 - 帅气，稍扬 -->
  <path d="M19.5 21 Q22.5 19 26 21" stroke="#1C1917" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M30 21 Q33.5 19 36.5 21" stroke="#1C1917" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 腮红 - 轻微 -->
  <ellipse cx="19" cy="27.5" rx="2.5" ry="1.8" fill="#FCA5A5" opacity="0.5"/>
  <ellipse cx="37" cy="27.5" rx="2.5" ry="1.8" fill="#FCA5A5" opacity="0.5"/>
  <!-- 鼻子 -->
  <path d="M27 27.5 Q26.5 30 28 30.5 Q29.5 30 29 27.5" stroke="#D97706" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- 嘴巴 - 开朗大笑 -->
  <path d="M23 30.5 Q28 35 33 30.5" stroke="#92400E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M24 31 Q28 34 32 31" fill="#FCA5A5" opacity="0.3"/>
  <!-- 牙齿小露 -->
  <path d="M25 31.5 Q28 33.5 31 31.5" fill="white"/>
</svg>
