<!-- AI 简单：8-10岁男孩，圆脸，短发，阳光笑容 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <!-- 背景圆 -->
  <circle cx="28" cy="28" r="27" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
