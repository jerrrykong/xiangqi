  <rect x="24" y="37" width="8" height="6" rx="3" fill="#FBBF24"/>
  <!-- 衣服 -->
  <path d="M14 52 Q14 44 28 44 Q42 44 42 52Z" fill="#60A5FA"/>
  <!-- 衣领 -->
  <path d="M23 44 L28 49 L33 44" fill="white" stroke="#BFDBFE" stroke-width="0.8"/>
  <!-- 头部 -->
  <circle cx="28" cy="24" r="13" fill="#FBBF24"/>
  <!-- 头发 -->
  <path d="M15 23 Q15 11 28 11 Q41 11 41 23" fill="#78350F"/>
  <path d="M15 23 Q14 18 17 15" fill="#78350F" stroke="#78350F" stroke-width="0.5"/>
  <path d="M41 23 Q42 18 39 15" fill="#78350F" stroke="#78350F" stroke-width="0.5"/>
  <!-- 刘海 -->
  <path d="M17 19 Q20 15 28 14 Q36 15 39 19" fill="#78350F"/>
  <!-- 耳朵 -->
  <ellipse cx="15.5" cy="24.5" rx="2.5" ry="3" fill="#F59E0B"/>
  <ellipse cx="40.5" cy="24.5" rx="2.5" ry="3" fill="#F59E0B"/>
  <!-- 眼睛 - 大圆眼 -->
  <circle cx="23" cy="24" r="3" fill="white"/>
  <circle cx="33" cy="24" r="3" fill="white"/>
  <circle cx="23.8" cy="24.5" r="1.8" fill="#1C1917"/>
  <circle cx="33.8" cy="24.5" r="1.8" fill="#1C1917"/>
  <circle cx="24.4" cy="23.8" r="0.7" fill="white"/>
  <circle cx="34.4" cy="23.8" r="0.7" fill="white"/>
  <!-- 腮红 -->
  <ellipse cx="19" cy="27.5" rx="3" ry="2" fill="#FCA5A5" opacity="0.7"/>
  <ellipse cx="37" cy="27.5" rx="3" ry="2" fill="#FCA5A5" opacity="0.7"/>
  <!-- 嘴巴 - 阳光大笑 -->
  <path d="M23 30 Q28 35 33 30" stroke="#78350F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 眉毛 -->
  <path d="M20 20.5 Q23 19 26 20.5" stroke="#78350F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M30 20.5 Q33 19 36 20.5" stroke="#78350F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
