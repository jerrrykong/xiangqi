<!-- AI 中等：15-20岁男孩，有些帅气，稍长脸型 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <!-- 背景圆 -->
  <circle cx="28" cy="28" r="27" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <!-- 脖子 -->
  <rect x="24.5" y="37" width="7" height="6" rx="3" fill="#FCD34D"/>
  <!-- 衣服 -->
  <path d="M14 52 Q14 44 28 44 Q42 44 42 52Z" fill="#34D399"/>
  <!-- 运动线条装饰 -->
  <path d="M23 44 L28 49 L33 44" fill="white" stroke="#A7F3D0" stroke-width="0.8"/>
  <!-- 头部 - 稍微椭圆 -->
  <ellipse cx="28" cy="24" rx="12.5" ry="13.5" fill="#FCD34D"/>
  <!-- 头发 - 侧分帅气 -->
  <path d="M15.5 20 Q16 11 28 11 Q40 11 40.5 20" fill="#292524"/>
  <path d="M15.5 20 Q16 16 19 14" fill="#292524"/>
  <!-- 侧分刘海 -->
  <path d="M15.5 20 Q21 12 31 13 Q37 14 40 19" fill="#292524"/>
  <!-- 刘海垂下 -->
  <path d="M21 16 Q20 19 19 21" stroke="#292524" stroke-width="1.5" fill="none"/>
  <!-- 耳朵 -->
  <ellipse cx="15.5" cy="24" rx="2.5" ry="3" fill="#EAB308"/>
  <ellipse cx="40.5" cy="24" rx="2.5" ry="3" fill="#EAB308"/>
  <!-- 眼睛 - 稍细长 -->
  <ellipse cx="23" cy="23.5" rx="3" ry="2.2" fill="white"/>
  <ellipse cx="33" cy="23.5" rx="3" ry="2.2" fill="white"/>
  <circle cx="23.5" cy="23.8" r="1.6" fill="#1C1917"/>
  <circle cx="33.5" cy="23.8" r="1.6" fill="#1C1917"/>
  <circle cx="24.1" cy="23.2" r="0.6" fill="white"/>
  <circle cx="34.1" cy="23.2" r="0.6" fill="white"/>
  <!-- 眉毛 - 略挑，有型 -->
  <path d="M20 20 Q23 18.5 26 19.5" stroke="#292524" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M30 19.5 Q33 18.5 36 20" stroke="#292524" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 鼻子 -->
  <path d="M27 27 Q28 29 29 27" stroke="#D97706" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- 嘴巴 - 淡淡微笑 -->
  <path d="M24 30.5 Q28 33 32 30.5" stroke="#92400E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 轻微腮红 -->
  <ellipse cx="19.5" cy="27" rx="2.5" ry="1.5" fill="#FCA5A5" opacity="0.5"/>
  <ellipse cx="36.5" cy="27" rx="2.5" ry="1.5" fill="#FCA5A5" opacity="0.5"/>
</svg>
