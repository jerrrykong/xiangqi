<!-- 玩家头像：18岁温柔女孩，长发披肩，气质清雅 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <!-- 背景圆 -->
  <circle cx="28" cy="28" r="27" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <!-- 长发披肩 (在衣服后面) -->
  <!-- 左侧长发 -->
  <path d="M15 22 Q10 30 11 40 Q12 46 15 48 Q17 49 18 47 Q17 40 18 30 Q17 25 15 22" fill="#78350F"/>
  <!-- 右侧长发 -->
  <path d="M41 22 Q46 30 45 40 Q44 46 41 48 Q39 49 38 47 Q39 40 38 30 Q39 25 41 22" fill="#78350F"/>
  <!-- 衣服 - 轻盈，紫色 -->
  <path d="M13 54 Q14 43 28 43 Q42 43 43 54Z" fill="#8B5CF6"/>
  <!-- 优雅领口 -->
  <path d="M22 43 Q28 48 34 43" fill="#A78BFA" opacity="0.7"/>
  <!-- 脖子 -->
  <rect x="24.5" y="36.5" width="7" height="7" rx="3.5" fill="#FCEAEA"/>
  <!-- 头部 - 椭圆，瓜子脸 -->
  <ellipse cx="28" cy="24" rx="12" ry="14" fill="#FCEAEA"/>
  <!-- 刘海 -->
  <path d="M16 21 Q16 10 28 10 Q40 10 40 21" fill="#78350F"/>
  <!-- 空气刘海 -->
  <path d="M18 18 Q22 12 28 11.5 Q34 12 38 18" fill="#92400E"/>
  <!-- 边缘碎刘海 -->
  <path d="M16.5 20 Q17 16 20 14" stroke="#78350F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M39.5 20 Q39 16 36 14" stroke="#78350F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 细碎刘海 -->
  <path d="M22 12.5 Q21 16 20.5 19" stroke="#92400E" stroke-width="1.2" fill="none"/>
  <path d="M34 12.5 Q35 16 35.5 19" stroke="#92400E" stroke-width="1.2" fill="none"/>
  <!-- 耳朵 -->
  <ellipse cx="16" cy="25" rx="2.5" ry="3" fill="#F4C2C2"/>
  <ellipse cx="40" cy="25" rx="2.5" ry="3" fill="#F4C2C2"/>
  <!-- 耳钉 -->
  <circle cx="16" cy="24" r="1" fill="#D97706"/>
  <circle cx="40" cy="24" r="1" fill="#D97706"/>
  <!-- 眼睛 - 温柔，杏眼 -->
  <ellipse cx="22.5" cy="24" rx="3.2" ry="2.5" fill="white"/>
  <ellipse cx="33.5" cy="24" rx="3.2" ry="2.5" fill="white"/>
  <!-- 上眼皮眼影 -->
  <path d="M19.5 22.5 Q22.5 21 25.5 22.5" stroke="#C084FC" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M30.5 22.5 Q33.5 21 36.5 22.5" stroke="#C084FC" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- 双眼皮线 -->
  <path d="M19.8 23 Q22.5 21.5 25.2 23" stroke="#78350F" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M30.8 23 Q33.5 21.5 36.2 23" stroke="#78350F" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- 瞳仁 -->
  <circle cx="22.8" cy="24.3" r="2" fill="#78350F"/>
  <circle cx="33.8" cy="24.3" r="2" fill="#78350F"/>
  <!-- 高光 -->
  <circle cx="23.5" cy="23.5" r="0.8" fill="white"/>
  <circle cx="34.5" cy="23.5" r="0.8" fill="white"/>
  <!-- 睫毛 -->
  <line x1="19.8" y1="22.8" x2="18.8" y2="21.5" stroke="#78350F" stroke-width="1.2"/>
  <line x1="22.5" y1="22" x2="22.5" y2="20.5" stroke="#78350F" stroke-width="1.2"/>
  <line x1="25.2" y1="22.8" x2="26.2" y2="21.5" stroke="#78350F" stroke-width="1.2"/>
  <line x1="30.8" y1="22.8" x2="29.8" y2="21.5" stroke="#78350F" stroke-width="1.2"/>
  <line x1="33.5" y1="22" x2="33.5" y2="20.5" stroke="#78350F" stroke-width="1.2"/>
  <line x1="36.2" y1="22.8" x2="37.2" y2="21.5" stroke="#78350F" stroke-width="1.2"/>
  <!-- 眉毛 - 清秀弧形 -->
  <path d="M19 21 Q22.5 19.5 26 21" stroke="#78350F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M30 21 Q33.5 19.5 37 21" stroke="#78350F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 鼻子 - 小巧 -->
  <path d="M27 27.5 Q26.5 29.5 28 30 Q29.5 29.5 29 27.5" stroke="#E8B4B8" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- 腮红 - 微微泛红 -->
  <ellipse cx="18.5" cy="28.5" rx="3" ry="2" fill="#FCA5A5" opacity="0.55"/>
  <ellipse cx="37.5" cy="28.5" rx="3" ry="2" fill="#FCA5A5" opacity="0.55"/>
  <!-- 嘴巴 - 温柔微笑 -->
  <path d="M24.5 31.5 Q28 34 31.5 31.5" stroke="#DB2777" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 下唇 -->
  <path d="M25.5 32.5 Q28 33.5 30.5 32.5" fill="#FCA5A5" opacity="0.5"/>
</svg>
