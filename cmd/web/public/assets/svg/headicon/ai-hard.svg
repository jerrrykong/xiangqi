  <path d="M19 21 Q22.5 19.5 26 21" stroke="#1C1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M30 21 Q33.5 19.5 37 21" stroke="#1C1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
