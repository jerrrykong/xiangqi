<!-- 玩家头像：10岁可爱女孩，圆脸，双马尾，蝴蝶结 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <!-- 背景圆 -->
  <circle cx="28" cy="28" r="27" fill="#FFF0F5" stroke="#DB2777" stroke-width="1.5"/>
  <!-- 衣服 -->
  <path d="M13 54 Q14 44 28 44 Q42 44 43 54Z" fill="#F472B6"/>
  <!-- 蕾丝领口 -->
  <path d="M23 44 Q28 47 33 44" fill="white" opacity="0.8"/>
  <path d="M23 44 Q25 46 28 44.5 Q31 46 33 44" fill="none" stroke="white" stroke-width="0.8"/>
  <!-- 脖子 -->
  <rect x="24.5" y="37" width="7" height="7" rx="3" fill="#FDE8EC"/>
  <!-- 头部圆脸 -->
  <circle cx="28" cy="24" r="13.5" fill="#FDE8EC"/>
  <!-- 头发 - 刘海 -->
  <path d="M14.5 22 Q14.5 11 28 10.5 Q41.5 11 41.5 22" fill="#78350F"/>
  <!-- 刘海弧形 -->
  <path d="M14.5 21 Q20 13 28 12.5 Q36 13 41.5 21" fill="#78350F"/>
  <!-- 刘海下缘弧 -->
  <path d="M17 20 Q22 16 28 15 Q34 16 39 20" fill="#92400E"/>
  <!-- 双马尾 -->
  <!-- 左马尾 -->
  <path d="M15 20 Q8 22 8 30 Q8 36 13 38 Q16 39 17 36 Q15 30 16 22" fill="#78350F"/>
  <path d="M15 20 Q9 25 10 33 Q11 37 14 37" stroke="#92400E" stroke-width="0.5" fill="none"/>
  <!-- 右马尾 -->
  <path d="M41 20 Q48 22 48 30 Q48 36 43 38 Q40 39 39 36 Q41 30 40 22" fill="#78350F"/>
  <!-- 蝴蝶结 - 左 -->
  <ellipse cx="15.5" cy="19" rx="4" ry="2.5" fill="#F9A8D4" transform="rotate(-15 15.5 19)"/>
  <ellipse cx="16.5" cy="20" rx="4" ry="2.5" fill="#F9A8D4" transform="rotate(-25 16.5 20)"/>
  <circle cx="16" cy="19.5" r="1.5" fill="#EC4899"/>
  <!-- 蝴蝶结 - 右 -->
  <ellipse cx="40.5" cy="19" rx="4" ry="2.5" fill="#F9A8D4" transform="rotate(15 40.5 19)"/>
  <ellipse cx="39.5" cy="20" rx="4" ry="2.5" fill="#F9A8D4" transform="rotate(25 39.5 20)"/>
  <circle cx="40" cy="19.5" r="1.5" fill="#EC4899"/>
  <!-- 耳朵 -->
  <ellipse cx="14.5" cy="24.5" rx="2.5" ry="3" fill="#F9A8D4"/>
  <ellipse cx="41.5" cy="24.5" rx="2.5" ry="3" fill="#F9A8D4"/>
  <!-- 眼睛 - 大而水灵 -->
  <circle cx="22.5" cy="24" r="3.5" fill="white"/>
  <circle cx="33.5" cy="24" r="3.5" fill="white"/>
  <!-- 眼睫毛 -->
  <path d="M19.2 23 Q22.5 21 25.8 23" stroke="#78350F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M30.2 23 Q33.5 21 36.8 23" stroke="#78350F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 睫毛小线条 -->
  <line x1="19.5" y1="22.8" x2="18.5" y2="21.5" stroke="#78350F" stroke-width="1"/>
  <line x1="22.5" y1="21.5" x2="22.5" y2="20" stroke="#78350F" stroke-width="1"/>
  <line x1="25.5" y1="22.8" x2="26.5" y2="21.5" stroke="#78350F" stroke-width="1"/>
  <line x1="30.5" y1="22.8" x2="29.5" y2="21.5" stroke="#78350F" stroke-width="1"/>
  <line x1="33.5" y1="21.5" x2="33.5" y2="20" stroke="#78350F" stroke-width="1"/>
  <line x1="36.5" y1="22.8" x2="37.5" y2="21.5" stroke="#78350F" stroke-width="1"/>
  <!-- 瞳仁 -->
  <circle cx="22.8" cy="24.5" r="2.3" fill="#78350F"/>
  <circle cx="33.8" cy="24.5" r="2.3" fill="#78350F"/>
  <circle cx="23.5" cy="23.5" r="0.9" fill="white"/>
  <circle cx="34.5" cy="23.5" r="0.9" fill="white"/>
  <!-- 腮红 - 粉嘟嘟 -->
  <circle cx="18.5" cy="28" r="3.5" fill="#FCA5A5" opacity="0.7"/>
  <circle cx="37.5" cy="28" r="3.5" fill="#FCA5A5" opacity="0.7"/>
  <!-- 嘴巴 - 小樱桃 -->
  <path d="M24.5 31 Q28 34 31.5 31" stroke="#DB2777" stroke-width="1.5" fill="#FB7185" opacity="0.6" stroke-linecap="round"/>
